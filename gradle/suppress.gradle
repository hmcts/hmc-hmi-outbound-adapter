import groovy.util.slurpersupport.GPathResult
import groovy.xml.DOMBuilder
import groovy.xml.XmlUtil
import org.w3c.dom.Document
import org.w3c.dom.Element
import org.w3c.dom.Node
import org.w3c.dom.NodeList

import javax.xml.xpath.XPathConstants
import javax.xml.xpath.XPathExpression
import javax.xml.xpath.XPathFactory

void suppressCves(String reportName = Globals.REPORT_NAME) {
  // Default output directory is 'build/reports'
  def outputDirectory = dependencyCheck.getOutputDirectory()
  if (outputDirectory.respondsTo('get')) {
    outputDirectory = outputDirectory.get().asFile
  }
  def reportFile = new File(project.file(outputDirectory), reportName)
  if (!reportFile.isFile()) {
    throw new FileNotFoundException("Report file not found." +
      "\nPossible Solution: run :dependencyCheckAggregate")
  }

  // Creates a unique set of non-suppressed dependency/vulnerability pairs.
  GPathResult vulnerabilityReport = new XmlSlurper().parse(new FileReader(reportFile))
  Set<Map<String, String>> unSuppressedFindings = collectUnsuppressedFindings(vulnerabilityReport)

  if (!unSuppressedFindings.isEmpty()) {
    // Suppression file must be specified as 'suppressionFile=...' in build.gradle.
    def suppressionFilePath = dependencyCheck.getSuppressionFile()
    if (suppressionFilePath.respondsTo('get')) {
      suppressionFilePath = suppressionFilePath.get()
    }
    File suppressionFile = project.file(suppressionFilePath)

    String suppressionXml = new String(suppressionFile.readBytes(), "UTF-8")
    Element suppressionDoc = DOMBuilder.parse(new StringReader(suppressionXml)).getDocumentElement()
    addNewSuppressions(unSuppressedFindings, suppressionDoc)
    suppressionFile.write(XmlUtil.serialize(cleanXml(suppressionDoc)))
  }
}

static Set<Map<String, String>> collectUnsuppressedFindings(GPathResult vulnerabilityReport) {
  Set<Map<String, String>> findings = [] as Set

  vulnerabilityReport.'**'
    .findAll { node -> node.name() == 'dependency' }
    .each { dependency ->
      String fileName = dependency.fileName.text()
      String packageUrl = dependency.identifiers.package.id.text()
      String sha1 = dependency.sha1.text()
      String matchElement = packageUrl ? "packageUrl" : "sha1"
      String matchValue = packageUrl ?: sha1

      if (matchValue) {
        dependency.vulnerabilities.vulnerability.each { vulnerability ->
          String cveValue = vulnerability.name.text()
          if (cveValue.contains("CVE")) {
            findings << [
              fileName: fileName,
              matchElement: matchElement,
              matchValue: matchValue,
              cve: cveValue
            ]
          }
        }
      }
    }

  findings
}

static void addNewSuppressions(Set<Map<String, String>> findings, Element suppressionDoc) {
  Document document = suppressionDoc.getOwnerDocument()
  String namespace = suppressionDoc.getNamespaceURI()

  findings
    .groupBy { [it.matchElement, it.matchValue, it.fileName] }
    .each { key, dependencyFindings ->
      String matchElement = key[0]
      String matchValue = key[1]
      String fileName = key[2]
      List<String> cves = dependencyFindings.collect { it.cve }.unique().sort()
      Element existingSuppression = findExactSuppression(suppressionDoc, matchElement, matchValue)

      if (existingSuppression) {
        cves.findAll { !hasDirectChildText(existingSuppression, "cve", it) }
          .each { appendTextElement(document, existingSuppression, namespace, "cve", it) }
      } else {
        Element suppressNode = document.createElementNS(namespace, "suppress")
        Element notesNode = document.createElementNS(namespace, "notes")
        notesNode.appendChild(document.createCDATASection(
          "\n        ${Globals.TEXT_TO_FIND}\n        file name: ${fileName}\n        "
        ))

        suppressNode.appendChild(notesNode)
        appendTextElement(document, suppressNode, namespace, matchElement, matchValue)
        cves.each { appendTextElement(document, suppressNode, namespace, "cve", it) }
        suppressionDoc.appendChild(suppressNode)
      }
    }
}

static Element findExactSuppression(Element suppressionDoc, String matchElement, String matchValue) {
  NodeList suppressNodes = suppressionDoc.getElementsByTagNameNS("*", "suppress")
  for (int i = 0; i < suppressNodes.getLength(); i++) {
    Element suppressNode = suppressNodes.item(i) as Element
    if (hasDirectChildText(suppressNode, matchElement, matchValue)) {
      return suppressNode
    }
  }
  return null
}

static boolean hasDirectChildText(Element parent, String childName, String childText) {
  NodeList childNodes = parent.getChildNodes()
  for (int i = 0; i < childNodes.getLength(); i++) {
    Node childNode = childNodes.item(i)
    if (childNode.getNodeType() == Node.ELEMENT_NODE && nodeNameMatches(childNode, childName)) {
      Element childElement = childNode as Element
      if (childElement.getAttribute("regex") != "true" && childElement.getTextContent().trim() == childText) {
        return true
      }
    }
  }
  return false
}

static boolean nodeNameMatches(Node node, String name) {
  node.getLocalName() == name || node.getNodeName() == name
}

static void appendTextElement(Document document, Element parent, String namespace, String name, String value) {
  Element child = document.createElementNS(namespace, name)
  child.appendChild(document.createTextNode(value))
  parent.appendChild(child)
}

static def cleanXml(Element suppressionDoc) {
  // Strip out whitespace and empty nodes
  XPathExpression xpathExp = XPathFactory.newInstance().newXPath().compile(
    "//text()[normalize-space(.) = '']")

  NodeList emptyTextNodes = xpathExp.evaluate(suppressionDoc, XPathConstants.NODESET) as NodeList
  if (emptyTextNodes.getLength()) {
    for (int i = 0; i < emptyTextNodes.getLength(); i++) {
      Node emptyTextNode = emptyTextNodes.item(i)
      emptyTextNode.getParentNode().removeChild(emptyTextNode)
    }
  }
  return suppressionDoc
}

class Globals {
  static String TEXT_TO_FIND = "Temporary Suppression"
  static String REPORT_NAME = "dependency-check-report.xml"
}

task suppressCves() {
  doLast {
    // Optional argument can be added to specify the name of the report file.
    // If no argument is specified, the default report file is 'dependency-check-report.xml'
    suppressCves()
  }
}
